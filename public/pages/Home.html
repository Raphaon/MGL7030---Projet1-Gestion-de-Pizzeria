<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application de gestion de pizzeria</title>
    <link rel="stylesheet" href="./Assets/Css/main.css">
   

</head>


<body>
    <!--
    definition d'un conteneur princiapale dans lequel tous les autres conteneurs vont etre inclus
    -->
    <div id="global-container">

        <!-- contient l'entete de note page il contient le titre -->
        <header class="title">
            <h1> PIZZERIA </h1>
        </header>
       
        <!-- contient la partie principale qui va potentiellement etre modifie aucours 
        de la manipulation de nos elements -->
        <main>

                <!-- liste des prix  -->
            <aside>
                <h2>Menu </h2>
                <!-- le menu est injectes dynamiquement par injecterMenuLateral() dans main.js -->
                <ul class="menu-items">
                </ul>

            </aside>



            <!-- les garnitures et les commandes  -->

            <div class="container">

                <!-- les garnitures  -->
                <div class="pizzas-container">
                    <h2>
                        Garniture
                    </h2>
                    <div class="garnitures">
                        <table class="table-garniture">

                            <tr>
                                <th>Viandes</th>
                                <th>Légumes</th>
                            </tr>
                            <!-- Les sont injectées dynamiquement a partir de GET /api/meats et GET /api/veggies -->

                        </table>
                    </div>

                    <div>
                        <h2>Format</h2>
                        <table class="table-format">
                            <tr>
                                <td class="radio_format">
                                    <input type="radio" value="petite" name="format" id="petite">
                                </td>
                                <td>
                                    <label for="petite">Petite</label>
                                </td>
                            </tr>

                            <tr>
                                <td class="radio_format">
                                    <input type="radio" name="format" id="moyenne" value="moyenne">
                                </td>
                                <td>
                                    <label for="moyenne">Moyenne</label>
                                </td>
                            </tr>

                            <tr>
                                <td class="radio_format">
                                    <input type="radio" value="grande" name="format" id="grande">
                                </td>
                                <td>
                                    <label for="grande">Grande</label>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <div class="btn-commander">
                        <input type="button" value="Commander" id="orderBtn">
                    </div>
       
                </div>

                <div class="command-container">
                     <h2>Commandes</h2>
                     <table id="command-entry" border="1" class="table-format">

                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>Format</th>
                            <th>Type</th>
                            <th>Garniture</th>
                            <th>Prix ($)</th>
                            <th>#</th>
                       </tr>
                        </thead>
                        <tbody class="command-item">
                           
                        </tbody>
                        
                        <tfoot>
                            <tr>
                                <th>Date</th>
                                <th>Format</th>
                                <th>Type</th>
                                <th>Garniture</th>
                                <th>Prix ($)</th>
                                <th>#</th>
                            </tr>
                            <tr>
                                <td colspan="5"><strong>Total</strong></td>
                                <td id="totalPrix">0 $</td>
                            </tr>
                        </tfoot>
                     </table>
                </div>
                 
                </div>
                
            </div>
            
        </main>

        <footer>
            &copy Tout droit reserve 2026. 
        </footer>
    </div>

    <script  type="module" src="./Assets/Js/main.js" ></script>

</body>
</html>
